<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Gallery</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#startButton {
position:fixed;
z-index:9999;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:16px 28px;
font-size:20px;
border-radius:14px;
border:none;
background:white;
color:black;
}

#msg {
position:fixed;
z-index:9999;
bottom:20px;
left:10px;
right:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
text-align:center;
border-radius:10px;
font-size:15px;
}
</style>
</head>

<body>

<button id="startButton">Start AR</button>
<div id="msg">Tap Start AR</div>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-assets>
<video id="lineVideo" src="line.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
<video id="stickerVideo" src="sticker.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
<video id="logoVideo" src="logo.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="lineTarget" mindar-image-target="targetIndex: 0">
<a-video src="#lineVideo" width="1" height="0.65" position="0 0 0.03"></a-video>
</a-entity>

<a-entity id="stickerTarget" mindar-image-target="targetIndex: 1">
<a-video src="#stickerVideo" width="1" height="0.65" position="0 0 0.03"></a-video>
</a-entity>

<a-entity id="logoTarget" mindar-image-target="targetIndex: 2">
<a-video src="#logoVideo" width="1" height="0.65" position="0 0 0.03"></a-video>
</a-entity>

</a-scene>

<script>
const startButton = document.getElementById("startButton");
const msg = document.getElementById("msg");

const lineVideo = document.getElementById("lineVideo");
const stickerVideo = document.getElementById("stickerVideo");
const logoVideo = document.getElementById("logoVideo");

const lineTarget = document.getElementById("lineTarget");
const stickerTarget = document.getElementById("stickerTarget");
const logoTarget = document.getElementById("logoTarget");

function pauseAllVideos() {
  lineVideo.pause();
  stickerVideo.pause();
  logoVideo.pause();
}

startButton.addEventListener("click", async () => {
  startButton.style.display = "none";
  msg.innerText = "Camera loading. Please allow camera access.";
  msg.innerText = "Point camera at the object";
});

lineTarget.addEventListener("targetFound", () => {
  msg.innerText = "LINE detected";
  pauseAllVideos();
  lineVideo.currentTime = 0;
  lineVideo.play();
});

lineTarget.addEventListener("targetLost", () => {
  lineVideo.pause();
  msg.innerText = "Point camera at the object";
});

stickerTarget.addEventListener("targetFound", () => {
  msg.innerText = "Sticker detected";
  pauseAllVideos();
  stickerVideo.currentTime = 0;
  stickerVideo.play();
});

stickerTarget.addEventListener("targetLost", () => {
  stickerVideo.pause();
  msg.innerText = "Point camera at the object";
});

logoTarget.addEventListener("targetFound", () => {
  msg.innerText = "Logo detected";
  pauseAllVideos();
  logoVideo.currentTime = 0;
  logoVideo.play();
});

logoTarget.addEventListener("targetLost", () => {
  logoVideo.pause();
  msg.innerText = "Point camera at the object";
});
</script>

</body>
</html>
